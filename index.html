function wireEditorEvents(story){
  var area = document.getElementById('blocksArea');

  area.addEventListener('input', function(e){
    if(e.target.matches('.block-textarea')){
      var id = e.target.getAttribute('data-block-id');
      var b = draftChapter.content.find(function(x){ return x.id===id; });
      if(b){ b.text = e.target.value; markDirty(); }
      autoGrowTextarea(e.target);
    }
  });

  area.addEventListener('click', function(e){
    var insertBtn = e.target.closest('[data-action="insert-text"]');
    if(insertBtn){
      var idx = parseInt(insertBtn.getAttribute('data-index'), 10);
      draftChapter.content.splice(idx, 0, {id:genId(), type:'text', text:''});
      renderBlocksContainer();
      markDirty();
      focusBlockAt(idx);
      return;
    }
    var insertImgBtn = e.target.closest('[data-action="insert-image"]');
    if(insertImgBtn){
      var idx2 = parseInt(insertImgBtn.getAttribute('data-index'), 10);
      pickImageModal().then(function(src){
        if(!src) return;
        draftChapter.content.splice(idx2, 0, {id:genId(), type:'image', src:src, width:60});
        renderBlocksContainer();
        markDirty();
      });
      return;
    }
    var insertAfterBtn = e.target.closest('[data-action="insert-image-after"]');
    if(insertAfterBtn){
      var afterId = insertAfterBtn.getAttribute('data-block-id');
      var afterIdx = draftChapter.content.findIndex(function(x){ return x.id===afterId; });
      if(afterIdx === -1) afterIdx = draftChapter.content.length - 1;
      pickImageModal().then(function(src){
        if(!src) return;
        draftChapter.content.splice(afterIdx + 1, 0, {id:genId(), type:'image', src:src, width:60});
        renderBlocksContainer();
        markDirty();
      });
      return;
    }
    var delBtn = e.target.closest('[data-action="delete-block"]');
    if(delBtn){
      var bid = delBtn.getAttribute('data-block-id');
      draftChapter.content = draftChapter.content.filter(function(x){ return x.id!==bid; });
      renderBlocksContainer();
      markDirty();
      return;
    }
  });

  area.addEventListener('pointerdown', function(e){
    var handle = e.target.closest('.resize-handle');
    if(!handle) return;
    e.preventDefault();
    var blockId = handle.getAttribute('data-block-id');
    var wrap = handle.closest('.img-wrap');
    var containerWidth = wrap.parentElement.getBoundingClientRect().width;
    var startX = e.clientX;
    var startWidthPx = wrap.getBoundingClientRect().width;
    var block = draftChapter.content.find(function(x){ return x.id===blockId; });
    var readout = area.querySelector('.img-width-readout[data-block-id="'+blockId+'"]');
    function onMove(ev){
      var delta = ev.clientX - startX;
      var pct = Math.round(((startWidthPx + delta) / containerWidth) * 100);
      pct = Math.max(15, Math.min(100, pct));
      wrap.style.width = pct + '%';
      if(readout) readout.textContent = pct + '%';
      if(block) block.width = pct;
    }
    function onUp(){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      markDirty();
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  qs('#chapterTitleInput').addEventListener('input', function(e){
    draftChapter.title = e.target.value;
    markDirty();
  });

  qs('#chapterCoverPick').addEventListener('click', function(){
    pickImageModal({ratio: 1}).then(function(result){
      if(!result) return;
      draftChapter.cover = result.src;
      draftChapter.coverCrop = result.crop;
      qs('#chapterCoverPreview').innerHTML = coverImgHtml(draftChapter.cover, draftChapter.coverCrop);
      markDirty();
    });
  });
  qs('#chapterCoverRemove').addEventListener('click', function(){
    draftChapter.cover = '';
    draftChapter.coverCrop = null;
    qs('#chapterCoverPreview').innerHTML = icon('image');
    markDirty();
  });

  qs('#fabSave').addEventListener('click', function(){ saveDraftChapter(story); });

  currentCleanup = function(){ draftChapter = null; };
}

function focusBlockAt(idx){
  setTimeout(function(){
    var area = document.getElementById('blocksArea');
    var blocks = qsa('.block', area);
    var target = blocks[idx];
    if(target){
      var ta = target.querySelector('textarea');
      if(ta) ta.focus();
      target.scrollIntoView({block:'center', behavior:'smooth'});
    }
  }, 30);
}

function saveDraftChapter(story){
  var title = (qs('#chapterTitleInput').value || '').trim();
  if(!title){ toast('กรุณาใส่ชื่อตอน', true); return; }
  draftChapter.title = title;
  var now = Date.now();
  if(!draftChapter.id){ draftChapter.id = genId(); draftChapter.createdAt = now; }
  draftChapter.updatedAt = now;
  draftChapter.storyId = story.id;

  var fab = document.getElementById('fabSave');
  if(fab){ fab.disabled = true; fab.querySelector('span:last-child').textContent = 'กำลังบันทึก...'; }

  saveChapterContent(draftChapter).then(function(ok){
    if(!ok){
      if(fab){ fab.disabled=false; fab.querySelector('span:last-child').textContent='บันทึก'; }
      return;
    }
    return getStories().then(function(stories){
      var s = findStory(stories, story.id);
      if(!s) return;
      var meta = findChapterMeta(s, draftChapter.id);
      var preview = firstImageOf(draftChapter.content || []);
      var words = countWords(draftChapter.content || []);
      if(meta){
        meta.title = draftChapter.title;
        meta.cover = draftChapter.cover;
        meta.coverCrop = draftChapter.coverCrop;
        meta.previewImage = preview;
        meta.wordCount = words;
        meta.updatedAt = now;
      } else {
        s.chapters.push({id:draftChapter.id, title:draftChapter.title, cover:draftChapter.cover, coverCrop:draftChapter.coverCrop, previewImage:preview, wordCount:words, createdAt:now, updatedAt:now});
      }
      s.updatedAt = now;
      return saveStories(stories);
    });
  }).then(function(){
    draftDirty = false;
    toast('บันทึกตอนแล้ว');
    navigate('#/story/' + story.id);
  });
}

function renderReadView(app, storyId, chapterId){
  return getStories().then(function(stories){
    var story = findStory(stories, storyId);
    if(!story){
      app.innerHTML = '<div class="container"><div class="empty-state"><h3>ไม่พบเรื่องนี้</h3><a class="btn btn-primary" href="#/">กลับหน้าแรก</a></div></div>';
      return;
    }
    var chapters = story.chapters || [];
    var idx = -1;
    for(var i=0;i<chapters.length;i++){ if(chapters[i].id===chapterId) idx = i; }
    if(idx === -1){
      app.innerHTML = '<div class="container"><div class="empty-state"><h3>ไม่พบตอนนี้</h3><a class="btn btn-primary" href="#/story/'+story.id+'">กลับไปหน้ารายตอน</a></div></div>';
      return;
    }
    var prevCh = chapters[idx-1] || null;
    var nextCh = chapters[idx+1] || null;

    return getChapterContent(storyId, chapterId).then(function(ch){
      if(!ch){
        app.innerHTML = '<div class="container"><div class="empty-state"><h3>ไม่พบเนื้อหาตอนนี้</h3><a class="btn btn-primary" href="#/story/'+story.id+'">กลับไปหน้ารายตอน</a></div></div>';
        return;
      }
      return getSettings().then(function(settings){
        appSettings = settings;
        var fontOptionsHtml = FONT_OPTIONS.map(function(f){
          return '<option value="'+escapeAttr(f.value)+'" '+(f.value===settings.fontFamily?'selected':'')+'>'+escapeHtml(f.label)+'</option>';
        }).join('') + '<option value="'+MANAGE_FONTS_VALUE+'">+ จัดการฟอนต์ของฉัน...</option>';

        var blocksHtmlStr = (ch.content||[]).map(function(b){
          if(b.type==='text'){
            return nl2p(b.text);
          }
          var w = b.width || 60;
          return '<div class="reader-img" style="width:'+w+'%;"><img src="'+escapeAttr(b.src)+'" alt="" loading="lazy"></div>';
        }).join('');
        if(ch.cover){
          blocksHtmlStr = '<div class="reader-cover"><img src="'+escapeAttr(ch.cover)+'" alt="" loading="lazy"></div>' + blocksHtmlStr;
        }

        app.innerHTML =
          '<div class="reader" id="readerRoot">' +
            '<header class="reader-top" id="readerTop">' +
              '<a class="btn btn-icon" href="#/story/'+story.id+'" title="กลับไปหน้ารายตอน" aria-label="กลับ">'+icon('back')+'</a>' +
              '<div class="reader-titles">' +
                '<span class="reader-story-title">'+escapeHtml(story.title)+'</span>' +
                '<span class="reader-chapter-title">'+escapeHtml(ch.title)+'</span>' +
              '</div>' +
              '<div class="reader-font-controls">' +
                '<button class="font-btn" id="fontDec" title="ลดขนาดตัวอักษร" aria-label="ลดขนาดตัวอักษร">A-</button>' +
                '<button class="font-btn" id="fontInc" title="เพิ่มขนาดตัวอักษร" aria-label="เพิ่มขนาดตัวอักษร">A+</button>' +
                '<select class="select" id="fontFamilySelect">'+fontOptionsHtml+'</select>' +
              '</div>' +
            '</header>' +
            '<main class="reader-content" id="readerContent" style="font-size:'+settings.fontSize+'px;font-family:'+settings.fontFamily+';">' +
              (blocksHtmlStr || '<p class="reader-empty">ตอนนี้ยังไม่มีเนื้อหา</p>') +
            '</main>' +
            '<footer class="reader-bottom" id="readerBottom">' +
              '<button class="btn btn-ghost nav-chap" id="prevChapterBtn" '+(prevCh?'':'disabled')+'>'+icon('chevLeft')+'<span>ตอนที่แล้ว</span></button>' +
              '<button type="button" class="chap-progress" data-action="open-chapter-jump" data-story="'+story.id+'" data-chapter="'+ch.id+'">ตอน '+(idx+1)+' / '+chapters.length+'</button>' +
              '<button class="btn btn-primary nav-chap" id="nextChapterBtn" '+(nextCh?'':'disabled')+'><span>ตอนต่อไป</span>'+icon('chevRight')+'</button>' +
            '</footer>' +
          '</div>';

        return recordChapterOpen(story.id, ch.id).then(function(savedScrollRatio){
          wireReaderEvents(story, ch, prevCh, nextCh, savedScrollRatio);
        });
      });
    });
  });
}

function wireReaderEvents(story, ch, prevCh, nextCh, savedScrollRatio){
  var root = document.getElementById('readerRoot');
  var content = document.getElementById('readerContent');

  function isAtBottom(){
    return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 48);
  }
  function onScroll(){
    if(isAtBottom()){ root.classList.remove('bars-hidden'); return; }
    root.classList.add('bars-hidden');
  }
  function onContentTap(e){
    if(e.target.closest('a,button,select')) return;
    root.classList.toggle('bars-hidden');
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  content.addEventListener('click', onContentTap);

  /* ---- Restore scroll position to where the reader last left off ---- */
  if(savedScrollRatio > 0){
    /* Wait for images to load (they affect document height) before
       computing the target scroll position, otherwise we'd land short. */
    var restoreAttempts = 0;
    function restoreScroll(){
      restoreAttempts++;
      var scrollable = document.body.scrollHeight - window.innerHeight;
      if(scrollable > 0){
        window.scrollTo({top: scrollable * savedScrollRatio, behavior:'auto'});
      }
      /* Re-check shortly after in case images were still loading and the
         page grew taller, so the position lands accurately. Cap retries. */
      if(restoreAttempts < 3) setTimeout(restoreScroll, 220);
    }
    requestAnimationFrame(function(){ requestAnimationFrame(restoreScroll); });
  }

  /* ---- Continuously save scroll progress as the reader scrolls ---- */
  var scrollSaveTimer = null;
  function onScrollSaveProgress(){
    clearTimeout(scrollSaveTimer);
    scrollSaveTimer = setTimeout(function(){
      var scrollable = document.body.scrollHeight - window.innerHeight;
      var ratio = scrollable > 0 ? Math.min(1, Math.max(0, window.scrollY / scrollable)) : 0;
      saveScrollProgress(story.id, ch.id, ratio);
    }, 500);
  }
  window.addEventListener('scroll', onScrollSaveProgress, {passive:true});

  qs('#fontDec').addEventListener('click', function(){
    appSettings.fontSize = Math.max(14, appSettings.fontSize - 2);
    content.style.fontSize = appSettings.fontSize + 'px';
    saveSettingsData(appSettings);
  });
  qs('#fontInc').addEventListener('click', function(){
    appSettings.fontSize = Math.min(36, appSettings.fontSize + 2);
    content.style.fontSize = appSettings.fontSize + 'px';
    saveSettingsData(appSettings);
  });
  qs('#fontFamilySelect').addEventListener('change', function(e){
    if(e.target.value === MANAGE_FONTS_VALUE){
      e.target.value = appSettings.fontFamily;
      openManageFontsModal().then(function(){ render(); });
      return;
    }
    appSettings.fontFamily = e.target.value;
    content.style.fontFamily = appSettings.fontFamily;
    saveSettingsData(appSettings);
  });

  if(prevCh){
    qs('#prevChapterBtn').addEventListener('click', function(){ navigate('#/read/'+story.id+'/'+prevCh.id); });
  }
  if(nextCh){
    qs('#nextChapterBtn').addEventListener('click', function(){ navigate('#/read/'+story.id+'/'+nextCh.id); });
  }

  currentCleanup = function(){
    clearTimeout(scrollSaveTimer);
    window.removeEventListener('scroll', onScroll);
    window.removeEventListener('scroll', onScrollSaveProgress);
  };
}

document.addEventListener('click', function(e){
  var t;

  if((t = e.target.closest('[data-action="open-new-story"]'))){
    openStoryModal(null);
    return;
  }
  if((t = e.target.closest('[data-action="edit-story"]'))){
    e.preventDefault(); e.stopPropagation();
    getStories().then(function(stories){
      var s = findStory(stories, t.getAttribute('data-story'));
      if(s) openStoryModal(s);
    });
    return;
  }
  if((t = e.target.closest('[data-action="delete-story"]'))){
    e.preventDefault(); e.stopPropagation();
    var storyId = t.getAttribute('data-story');
    confirmDialog('ลบเรื่องนี้พร้อมทุกตอนถาวร? การลบนี้ไม่สามารถย้อนกลับได้', 'ลบเรื่องนี้').then(function(ok){
      if(!ok) return;
      getStories().then(function(stories){
        var s = findStory(stories, storyId);
        var isMangaStory = s && s.type === 'manga';
        var remaining = stories.filter(function(x){ return x.id!==storyId; });
        var delChapters = (s && s.chapters || []).map(function(c){
          return isMangaStory ? deleteMangaChapter(storyId, c.id) : deleteChapterContent(storyId, c.id);
        });
        Promise.all(delChapters).then(function(){
          return saveStories(remaining);
        }).then(function(){
          toast('ลบเรื่องแล้ว');
          if(isMangaStory) navigate('#/manga');
          else render();
        });
      });
    });
    return;
  }
  if((t = e.target.closest('[data-action="new-chapter"]'))){
    e.preventDefault();
    navigate('#/editor/' + t.getAttribute('data-story') + '/new');
    return;
  }
  if((t = e.target.closest('[data-action="goto-edit"]'))){
    e.preventDefault(); e.stopPropagation();
    navigate('#/editor/' + t.getAttribute('data-story') + '/' + t.getAttribute('data-chapter'));
    return;
  }
  if((t = e.target.closest('[data-action="move-chapter-up"]'))){
    e.preventDefault(); e.stopPropagation();
    moveChapter(t.getAttribute('data-story'), t.getAttribute('data-chapter'), -1);
    return;
  }
  if((t = e.target.closest('[data-action="move-chapter-down"]'))){
    e.preventDefault(); e.stopPropagation();
    moveChapter(t.getAttribute('data-story'), t.getAttribute('data-chapter'), 1);
    return;
  }
  if((t = e.target.closest('[data-action="delete-chapter"]'))){
    e.preventDefault(); e.stopPropagation();
    var sId = t.getAttribute('data-story'), cId = t.getAttribute('data-chapter');
    confirmDialog('ลบตอนนี้ถาวร? การลบนี้ไม่สามารถย้อนกลับได้', 'ลบตอนนี้').then(function(ok){
      if(!ok) return;
      getStories().then(function(stories){
        var s = findStory(stories, sId);
        if(!s) return;
        s.chapters = s.chapters.filter(function(c){ return c.id!==cId; });
        s.updatedAt = Date.now();
        deleteChapterContent(sId, cId).then(function(){
          return saveStories(stories);
        }).then(function(){
          toast('ลบตอนแล้ว');
          render();
        });
      });
    });
    return;
  }
  if((t = e.target.closest('[data-action="goto-read"]'))){
    if(e.target.closest('.chapter-row-actions')) return;
    navigate('#/read/' + t.getAttribute('data-story') + '/' + t.getAttribute('data-chapter'));
    return;
  }
  if((t = e.target.closest('[data-action="open-chapter-jump"]'))){
    getStories().then(function(stories){
      var s = findStory(stories, t.getAttribute('data-story'));
      if(s) openChapterJumpModal(s, t.getAttribute('data-chapter'));
    });
    return;
  }
  if((t = e.target.closest('[data-action="jump-chapter"]'))){
    closeModal();
    navigate('#/read/' + t.getAttribute('data-story') + '/' + t.getAttribute('data-chapter'));
    return;
  }
});

/* ============================================================
   READER / AUTHOR MODE
   Default is reader mode. Entering PIN 147120 unlocks
   author mode for the current browser session.
============================================================ */
var _AUTH_PIN = '147120';

function openPinDialog(){
  return new Promise(function(resolve){
    var host = openModal(
      '<div class="modal-card" style="max-width:320px;text-align:center;">' +
        '<div style="font-size:2rem;margin-bottom:12px;">🔐</div>' +
        '<h3 style="margin-bottom:8px;">เข้าสู่โหมดผู้เขียน</h3>' +
        '<p class="hint" style="margin-bottom:20px;">ใส่รหัสผ่านเพื่อจัดการและแก้ไขเนื้อหา</p>' +
        '<input class="input" id="pinInput" type="password" placeholder="รหัสผ่าน" ' +
               'autocomplete="current-password" inputmode="numeric" pattern="[0-9]*" ' +
               'style="text-align:center;font-size:1.6rem;letter-spacing:.35em;padding:12px 16px;">' +
        '<p class="hint" id="pinError" style="color:var(--danger);min-height:1.2em;margin-top:8px;"></p>' +
        '<div class="modal-actions" style="justify-content:center;margin-top:8px;">' +
          '<button class="btn btn-ghost" id="pinCancel">ยกเลิก</button>' +
          '<button class="btn btn-primary" id="pinConfirm">'+icon('unlock')+' เข้าสู่ระบบ</button>' +
        '</div>' +
      '</div>'
    );
    var pinInput = qs('#pinInput', host);
    var pinError = qs('#pinError', host);
    setTimeout(function(){ pinInput.focus(); }, 80);
    function tryPin(){
      var entered = pinInput.value.trim();
      if(entered === _AUTH_PIN){
        closeModal(); resolve(true);
      } else {
        pinInput.value = '';
        pinInput.style.borderColor = 'var(--danger)';
        pinError.textContent = 'รหัสไม่ถูกต้อง กรุณาลองอีกครั้ง';
        setTimeout(function(){ pinInput.style.borderColor=''; }, 1200);
        pinInput.focus();
      }
    }
    qs('#pinCancel', host).addEventListener('click', function(){ closeModal(); resolve(false); });
    qs('#pinConfirm', host).addEventListener('click', tryPin);
    pinInput.addEventListener('keydown', function(e){ if(e.key==='Enter') tryPin(); });
  });
}

function applyAuthMode(){
  document.body.classList.toggle('author-mode', _authorMode);
  var btn = document.getElementById('authToggle');
  if(!btn) return;
  if(_authorMode){
    btn.innerHTML = icon('unlock');
    btn.title = 'โหมดผู้เขียน (เปิดใช้งาน) — กดเพื่อล็อก';
    btn.classList.add('is-author');
  } else {
    btn.innerHTML = icon('lock');
    btn.title = 'กดเพื่อเข้าสู่โหมดผู้เขียน';
    btn.classList.remove('is-author');
  }
}

function initAuthToggle(){
  /* Restore session: stays unlocked as long as the tab is open */
  try{ if(sessionStorage.getItem('_am')==='1') _authorMode = true; }catch(e){}
  applyAuthMode();
  var btn = document.getElementById('authToggle');
  if(!btn) return;
  btn.addEventListener('click', function(){
    if(_authorMode){
      confirmDialog('ออกจากโหมดผู้เขียนและกลับสู่โหมดผู้อ่าน?', 'ออกจากระบบ').then(function(ok){
        if(!ok) return;
        _authorMode = false;
        try{ sessionStorage.removeItem('_am'); }catch(e){}
        applyAuthMode();
        render();
        toast('กลับสู่โหมดผู้อ่านแล้ว');
      });
    } else {
      openPinDialog().then(function(success){
        if(!success) return;
        _authorMode = true;
        try{ sessionStorage.setItem('_am','1'); }catch(e){}
        applyAuthMode();
        render();
        toast('เข้าสู่โหมดผู้เขียนแล้ว ยินดีต้อนรับ!');
      });
    }
  });
}

function initAdultToggle(){
  var btn = document.getElementById('adultToggle');
  var label = document.getElementById('adultToggleLabel');
  function applyState(){
    btn.classList.toggle('is-on', !!appSettings.adult);
    btn.setAttribute('aria-pressed', appSettings.adult ? 'true':'false');
    btn.title = appSettings.adult ? '18+ เปิดอยู่ — กดเพื่อปิด' : '18+ ปิดอยู่ — กดเพื่อเปิด';
    label.textContent = '18+';
    document.body.classList.toggle('adult-on', !!appSettings.adult);
  }
  applyState();
  btn.addEventListener('click', function(){
    appSettings.adult = !appSettings.adult;
    applyState();
    saveSettingsData(appSettings);
  });
}

function initThemeToggle(){
  var btn = document.getElementById('themeToggle');
  function applyState(){
    var isLight = appSettings.theme === 'light';
    document.body.classList.toggle('theme-light', isLight);
    btn.innerHTML = icon(isLight ? 'sun' : 'moon');
    btn.title = isLight ? 'สลับเป็นโหมดมืด' : 'สลับเป็นโหมดสว่าง';
  }
  applyState();
  btn.addEventListener('click', function(){
    appSettings.theme = (appSettings.theme === 'light') ? 'dark' : 'light';
    applyState();
    saveSettingsData(appSettings);
    applyBackground();   /* re-apply because preset gradients differ per theme */
  });
}

  {id:2, name:'ห้องสมุดอบอุ่น',
   darkBg: 'radial-gradient(ellipse 900px 500px at 12% -10%, rgba(196,140,60,.22), transparent 60%), radial-gradient(ellipse 700px 500px at 100% 0%, rgba(168,122,46,.13), transparent 55%), radial-gradient(ellipse 1000px 700px at 50% 110%, rgba(110,70,30,.18), transparent 60%), #1d160e',
   lightBg:'radial-gradient(ellipse 900px 500px at 12% -10%, rgba(196,140,60,.13), transparent 60%), radial-gradient(ellipse 700px 500px at 100% 0%, rgba(168,122,46,.09), transparent 55%), radial-gradient(ellipse 1000px 700px at 50% 110%, rgba(110,70,30,.08), transparent 60%), #fdf8ee',
   swatch:'radial-gradient(circle at 30% 25%, rgba(196,140,60,.8), transparent 60%), radial-gradient(circle at 78% 75%, rgba(110,70,30,.7), transparent 60%), #1d160e'},
  {id:3, name:'ป่าหมอกราตรี',
   darkBg: 'radial-gradient(ellipse 900px 500px at 12% -10%, rgba(46,143,130,.20), transparent 60%), radial-gradient(ellipse 700px 500px at 100% 0%, rgba(58,110,168,.13), transparent 55%), radial-gradient(ellipse 1000px 700px at 50% 110%, rgba(30,90,70,.18), transparent 60%), #0e1718',
   lightBg:'radial-gradient(ellipse 900px 500px at 12% -10%, rgba(46,143,130,.11), transparent 60%), radial-gradient(ellipse 700px 500px at 100% 0%, rgba(58,110,168,.08), transparent 55%), radial-gradient(ellipse 1000px 700px at 50% 110%, rgba(30,90,70,.08), transparent 60%), #eff7f6',
   swatch:'radial-gradient(circle at 30% 25%, rgba(46,143,130,.75), transparent 60%), radial-gradient(circle at 78% 75%, rgba(58,110,168,.7), transparent 60%), #0e1718'}
];
function getBackgroundSettings(){
  return appSettings.background || {mode:'preset', presetId:1, customSrc:'', customOpacity:0.84};
}
function applyBackground(){
  var bg = getBackgroundSettings();
  var isLight = appSettings.theme === 'light';
  var photoLayer = document.getElementById('bgPhotoLayer');
  var scrim = document.getElementById('bgScrim');
  document.body.classList.remove('bg-custom');
  if(bg.mode === 'custom' && bg.customSrc){
    /* custom photo: clear gradient override, let CSS handle it, show the layers */
    document.body.style.background = '';
    document.body.classList.add('bg-custom');
    photoLayer.style.backgroundImage = 'url("' + bg.customSrc.replace(/"/g,'%22') + '")';
    scrim.style.background = 'rgba(var(--night-rgb),' + (bg.customOpacity != null ? bg.customOpacity : 0.84) + ')';
  } else {
    /* preset: directly apply gradient via JS so re-evaluation is guaranteed */
    photoLayer.style.backgroundImage = '';
    scrim.style.background = '';
    var preset = BG_PRESETS[0];
    for(var i=0;i<BG_PRESETS.length;i++){ if(BG_PRESETS[i].id === bg.presetId){ preset = BG_PRESETS[i]; break; } }
    document.body.style.background = isLight ? preset.lightBg : preset.darkBg;
  }
}
function initBackgroundCorner(){
  var btn = document.getElementById('bgChangeBtn');
  var threshold = 170;
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if(isTouch){
    btn.classList.add('visible');
    btn.style.opacity = '.55';
  } else {
    document.addEventListener('mousemove', function(e){
      var dx = window.innerWidth - e.clientX;
      var dy = window.innerHeight - e.clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      btn.classList.toggle('visible', dist < threshold);
    });
  }
  btn.addEventListener('click', function(){ openBackgroundModal(); });
}
function openBackgroundModal(){
  var bg = getBackgroundSettings();
  var presetsHtml = BG_PRESETS.map(function(p){
    var isActive = bg.mode==='preset' && bg.presetId===p.id;
    return (
      '<button type="button" class="bg-preset-option'+(isActive?' active':'')+'" data-action="choose-bg-preset" data-preset-id="'+p.id+'">' +
        '<span class="bg-preset-swatch" style="background:'+p.swatch+';"></span>' +
        '<span>'+p.name+(isActive?' ✓':'')+'</span>' +
      '</button>'
    );
  }).join('');
  var host = openModal(
    '<div class="modal-card" style="max-width:460px;">' +
      '<h3>เปลี่ยนพื้นหลังเว็บ</h3>' +
      '<p class="hint">เลือกพื้นหลังสำเร็จรูป</p>' +
      '<div class="bg-preset-grid">'+presetsHtml+'</div>' +
      '<p class="hint" style="margin-top:18px;">หรือใช้ภาพพื้นหลังของคุณเอง</p>' +
      '<div class="cover-picker">' +
        '<div class="cover-preview" id="bgCustomPreview" style="width:120px;height:72px;">' +
          (bg.mode==='custom' && bg.customSrc ? '<img src="'+escapeAttr(bg.customSrc)+'" alt="" style="width:100%;height:100%;object-fit:cover;">' : icon('image')) +
        '</div>' +
        '<div class="cover-actions">' +
          '<button type="button" class="btn btn-ghost btn-sm" id="bgCustomPick">'+icon('image')+' เลือกรูปภาพ</button>' +
          '<button type="button" class="btn btn-ghost btn-sm" id="bgCustomRemove">'+icon('x')+' ใช้แบบสำเร็จรูปแทน</button>' +
        '</div>' +
      '</div>' +
      '<div class="field" style="margin-top:14px;"><label>ความเข้มของภาพ (ความชัดของตัวอักษร)</label>' +
        '<input type="range" id="bgOpacitySlider" min="40" max="95" value="'+Math.round((bg.customOpacity!=null?bg.customOpacity:0.84)*100)+'"></div>' +
      '<div class="modal-actions"><button class="btn btn-ghost" id="bgModalClose">ปิด</button></div>' +
    '</div>'
  );
  function persist(){ saveSettingsData(appSettings); applyBackground(); }
  qsa('[data-action="choose-bg-preset"]', host).forEach(function(btn){
    btn.addEventListener('click', function(){
      var pid = parseInt(btn.getAttribute('data-preset-id'),10);
      appSettings.background = {mode:'preset', presetId:pid, customSrc:'', customOpacity:getBackgroundSettings().customOpacity};
      persist();
      qsa('.bg-preset-option', host).forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
    });
  });
  qs('#bgCustomPick', host).addEventListener('click', function(){
    pickImageModal().then(function(src){
      if(!src) return;
      var prevOpacity = getBackgroundSettings().customOpacity;
      appSettings.background = {mode:'custom', presetId:getBackgroundSettings().presetId, customSrc:src, customOpacity:(prevOpacity!=null?prevOpacity:0.84)};
      persist();
      qs('#bgCustomPreview', host).innerHTML = '<img src="'+escapeAttr(src)+'" alt="" style="width:100%;height:100%;object-fit:cover;">';
    });
  });
  qs('#bgCustomRemove', host).addEventListener('click', function(){
    var current = getBackgroundSettings();
    appSettings.background = {mode:'preset', presetId:current.presetId||1, customSrc:'', customOpacity:current.customOpacity};
    persist();
    qs('#bgCustomPreview', host).innerHTML = icon('image');
  });
  qs('#bgOpacitySlider', host).addEventListener('input', function(e){
    var current = getBackgroundSettings();
    current.customOpacity = parseInt(e.target.value,10)/100;
    appSettings.background = current;
    persist();
  });
  qs('#bgModalClose', host).addEventListener('click', closeModal);
}

/* ---- Content-mode toggle ---- */
/* Keep current mode in memory so the click handler never does an async
   storage read — that was the source of the stale-value / stacking bug. */
var _currentContentMode = 'novel';
var _authorMode = false; /* true only after correct PIN is entered */

function initContentModeToggle(){
  var btn = document.getElementById('contentModeToggle');
  if(!btn) return;
  /* _currentContentMode is already set by init() before this is called */
  applyContentModeBtn(btn, _currentContentMode);
  /* Single persistent listener — called only once from init(), never from render() */
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    var existing = document.getElementById('modeDropdown');
    if(existing){ existing.remove(); return; }
    openModeDropdown(btn);
  });
}

function openModeDropdown(btn){
  var CHOICES = [
    {mode:'novel', label:'นิยาย', svgPath:'<path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5z"/><path d="M4 4.5V19"/>'},
    {mode:'manga', label:'มังงะ', svgPath:'<rect x="2" y="3" width="9" height="18" rx="1.5"/><rect x="13" y="3" width="9" height="18" rx="1.5"/>'},
    {mode:'all',   label:'ทั้งหมด', svgPath:'<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>'}
  ];
  var dd = document.createElement('div');
  dd.id = 'modeDropdown';
  dd.className = 'mode-dropdown';
  dd.style.cssText = 'position:fixed;z-index:9999;';
  dd.innerHTML = CHOICES.map(function(c){
    var isActive = c.mode === _currentContentMode;
    return (
      '<button type="button" class="mode-dropdown-item'+(isActive?' active':'')+'" data-mode="'+c.mode+'">' +
        '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+c.svgPath+'</svg>' +
        c.label +
        '<svg class="icon mode-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' +
      '</button>'
    );
  }).join('');

  /* Append to body — never clipped by overflow:hidden on navbar */
  document.body.appendChild(dd);

  /* Position below the button */
  var r = btn.getBoundingClientRect();
  var ddW = 190;
  var left = Math.min(r.left, window.innerWidth - ddW - 6);
  left = Math.max(6, left);
  dd.style.top  = (r.bottom + 6) + 'px';
  dd.style.left = left + 'px';

  dd.addEventListener('click', function(e){
    var item = e.target.closest('[data-mode]');
    if(!item) return;
    var chosen = item.getAttribute('data-mode');
    dd.remove();
    document.removeEventListener('click', onOutside, true);
    document.removeEventListener('keydown', onEsc);
    if(chosen === _currentContentMode){ return; }
    _currentContentMode = chosen;
    setContentMode(chosen);
    applyContentModeBtn(btn, chosen);
    var route = parseRoute();
    var isHome = (route.view==='home'||route.view==='manga'||route.view==='all');
    if(isHome){ render(); } else { navigate('#/'); }
  });

  function onOutside(e){
    if(!btn.contains(e.target) && !dd.contains(e.target)){
      dd.remove();
      document.removeEventListener('click', onOutside, true);
      document.removeEventListener('keydown', onEsc);
    }
  }
  function onEsc(e){
    if(e.key==='Escape'){
      dd.remove();
      document.removeEventListener('click', onOutside, true);
      document.removeEventListener('keydown', onEsc);
    }
  }
  /* Delay so the same click that opened the dropdown doesn't instantly close it */
  setTimeout(function(){
    document.addEventListener('click', onOutside, true);
    document.addEventListener('keydown', onEsc);
  }, 20);
}
function applyContentModeBtn(btn, mode){
  var ICONS = {
    novel:'<path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5z"/><path d="M4 4.5V19"/>',
    manga:'<rect x="2" y="3" width="9" height="18" rx="1.5"/><rect x="13" y="3" width="9" height="18" rx="1.5"/>',
    all:'<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>'
  };
  var TITLES = {novel:'กำลังแสดง: นิยาย', manga:'กำลังแสดง: มังงะ', all:'กำลังแสดง: ทั้งหมด'};
  btn.className = 'content-mode-toggle mode-'+mode;
  btn.title = TITLES[mode]||'';
  btn.setAttribute('aria-label', TITLES[mode]||'');
  /* icon-only: no text label, just the mode icon + chevron */
  btn.innerHTML =
    '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[mode]||ICONS.novel)+'</svg>'+
    '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
}

function init(){
  Promise.all([getSettings(), loadCustomFontsAtStartup(), getContentMode(), tryLoadNovelsFromJson()]).then(function(results){
    appSettings = results[0];
    _currentContentMode = results[2] || 'novel';
    initAdultToggle();
    initAuthToggle();
    initThemeToggle();
    initContentModeToggle();
    applyBackground();
    initBackgroundCorner();
    /* brand button → always go to all-mode home */
    var brandBtn = document.getElementById('brandLink');
    if(brandBtn) brandBtn.addEventListener('click', function(){
      _currentContentMode = 'all';
      setContentMode('all');
      var btn = document.getElementById('contentModeToggle');
      if(btn) applyContentModeBtn(btn, 'all');
      if(location.hash === '#/' || location.hash === '' || location.hash === '#'){
        render(); /* already on home, just re-render with new mode */
      } else {
        navigate('#/');
      }
    });
    /* wire GitHub export button in navbar */
    var githubBtn = document.getElementById('githubExportBtn');
    if(githubBtn) githubBtn.addEventListener('click', function(){ exportToGitHub(); });
    render();
  });
}
init();

})();
</script>
